    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>

        <!-- Auth items will be injected here -->
        <li class="nav-item">
          <a class="nav-link" href="/login">Login</a>

<script type="module">
  import { authService } from '/src/api/index.js';

  async function updateAuthNav() {
    const authNav = document.getElementById('authNav');
    if (!authNav) return;

    try {
      const user = await authService.getCurrentUser();

      if (user) {
        const name = user.user_metadata?.full_name || user.user_metadata?.username || user.email;
        const isAdmin = user.user_metadata?.role === 'admin' || user.user_metadata?.role === 'superadmin';

        authNav.innerHTML = `
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              ${name}
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
              <li><a class="dropdown-item" href="/profile">Profile</a></li>
              ${isAdmin ? '<li><a class="dropdown-item" href="/admin">Dashboard</a></li>' : ''}
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item" id="logoutBtn">Logout</button></li>
            </ul>
          </li>
        `;

        document.getElementById('logoutBtn').addEventListener('click', async () => {
          await authService.logout();
          if (window.SPAFrame) {
            window.SPAFrame.navigate('/');
          } else {
            window.location.href = '/';
          }
        });
      } else {
        authNav.innerHTML = `
          <li class="nav-item">
            <a class="nav-link" href="/login">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-outline-light ms-2" href="/signup">Sign Up</a>
          </li>
        `;
      }
    } catch (e) {
      console.error('Auth check failed', e);
    }
  }

  // Initial run
  updateAuthNav();

  // Ensure we don't add the same listener multiple times when IncludeParser re-runs
  window.removeEventListener('spa-navigated', updateAuthNav);
  window.addEventListener('spa-navigated', updateAuthNav);
</script>

<script>
  (function () {
    const updateNav = () => {
      // Get current path, ignoring trailing slash for root
      const path = window.location.pathname === '/' ? '/' : window.location.pathname.replace(/\/$/, '');
      const links = document.querySelectorAll('.navbar-nav .nav-link, .navbar-nav .dropdown-item');

      links.forEach(link => {
        const href = link.getAttribute('href');
        if (!href) return;

        const cleanHref = href === '/' ? '/' : href.replace(/\/$/, '');
        const isActive = (cleanHref === path) || (cleanHref !== '/' && path.startsWith(cleanHref));

        if (isActive) {
          link.classList.add('active');
          if (link.classList.contains('nav-link')) link.style.fontWeight = 'bold';
        } else {
          link.classList.remove('active');
          if (link.classList.contains('nav-link')) link.style.fontWeight = 'normal';
        }
      });
    };

    // Initial run
    updateNav();

    // Prevent accumulation of these listeners too
    window.removeEventListener('spa-navigated', updateNav);
    window.addEventListener('spa-navigated', updateNav);
    window.removeEventListener('popstate', updateNav);
    window.addEventListener('popstate', updateNav);

    // One global click listener is fine as it's attached to document
    if (!window._navClickHandled) {
      document.addEventListener('click', (e) => {
        const link = e.target.closest('.nav-link, .dropdown-item');
        if (link && link.getAttribute('href')) {
          setTimeout(updateNav, 0);
        }
      });
      window._navClickHandled = true;
    }
  })();
</script>
