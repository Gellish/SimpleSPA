<title id="pageTitle">Universal Editor</title>

<!-- Specialized Styles from original editor.html -->
<style>
    /* Toast Styles */
    #toast-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Editor.js Polish */
    .codex-editor {
        z-index: 10;
        position: relative;
        color: #000 !important;
        text-align: left;
    }

    .ce-block {
        margin-bottom: 0 !important;
    }

    .ce-block__content,
    .ce-toolbar__content {
        max-width: none;
    }

    .ce-paragraph {
        line-height: 1.6;
        padding: 0.3rem 0 !important;
    }

    .ce-header {
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
    }

    /* Title Input Polish */
    .title-input {
        font-size: 2.2rem;
        font-weight: 700;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
        background: #fff !important;
        transition: border-color 0.2s, box-shadow 0.2s;
        margin-bottom: 1.5rem;
        color: #212529;
        width: 100%;
    }

    .title-input:focus {
        border-color: #86b7fe;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        outline: none;
    }

    .title-input::placeholder {
        color: #ced4da;
        font-weight: 400;
    }

    /* Drag and Drop Handling */
    .drag-handle {
        cursor: grab;
        padding: 5px;
        color: #adb5bd;
        transition: color 0.2s;
    }

    .drag-handle:hover {
        color: #6c757d;
    }

    .drag-handle:active {
        cursor: grabbing;
    }

    .list-group-item.dragging {
        opacity: 0.5;
        background: #e9ecef;
    }

    .list-group-item.drag-over {
        border-top: 2px solid #0d6efd;
    }

    /* Layout Polish */
    body {
        background-color: #f8f9fa;
    }

    .form-label {
        font-weight: 600;
        color: #495057;
        font-size: 0.9rem;
    }

    .card {
        border-radius: 12px;
    }

    /* EasyMDE Polish */
    .EasyMDEContainer {
        margin-top: 0.5rem;
    }

    .editor-toolbar {
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        background: #f8f9fa;
        border-color: #dee2e6;
    }

    .CodeMirror {
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        border-color: #dee2e6;
        min-height: 300px;
    }

    /* Image Upload UI */
    .image-preview-wrapper {
        position: relative;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px dashed #dee2e6;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }

    .image-preview-wrapper:hover {
        border-color: #0d6efd;
        background: #eef6ff;
    }

    .image-preview-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .image-preview-placeholder {
        color: #adb5bd;
        font-size: 1.5rem;
    }
</style>
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<div id="toast-container"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <!-- Main Column: Width depends on if we have a sidebar or not, but let's stick to center-ish -->
        <div class="col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3" id="editorHeader">Loading...</h1>
                <div>
                    <button class="btn btn-secondary me-2 btn-sm" onclick="history.back()">Cancel</button>
                    <button class="btn btn-primary btn-sm" id="saveBtn">Save Changes</button>
                    <button class="btn btn-outline-info btn-sm ms-2" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#offcanvasFieldManager">
                        <i class="bi bi-gear"></i> Manage Fields
                    </button>
                </div>
            </div>
        </div>

        <!-- Page Specific: Source Selection -->
        <div id="pageSpecificSection" style="display:none;" class="mb-4">
            <div class="row g-3 bg-white p-3 rounded border shadow-sm">
                <div class="col-md-6">
                    <label class="form-label text-muted small text-uppercase">Storage Source</label>
                    <select class="form-select form-select-sm" id="sourceSelector">
                        <option value="database">Database (Supabase)</option>
                        <option value="local">Offline File (Markdown)</option>
                        <option value="event-store">Event Store (Local-first)</option>
                    </select>
                </div>
                <div class="col-md-6" id="pathContainer" style="display:none;">
                    <label class="form-label text-muted small text-uppercase">Markdown File Path</label>
                    <input type="text" class="form-control form-control-sm" id="pathInput"
                        placeholder="src/route/posts/my-post.md">
                </div>
            </div>
        </div>

        <!-- Generic Fields Container -->
        <div id="fieldsContainer" class="mb-4">
            <!-- Fields are injected dynamically -->
        </div>

        <!-- Dynamic Fields (Auto-detected) -->
        <div id="dynamicFieldsContainer" class="mb-4 d-none">
            <!-- Auto-detected fields from frontmatter go here -->
        </div>

        <!-- Offcanvas for Field Management -->
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasFieldManager"
            aria-labelledby="offcanvasFieldManagerLabel">
            <div class="offcanvas-header bg-light border-bottom">
                <h5 class="offcanvas-title" id="offcanvasFieldManagerLabel">Field Management</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <p class="small text-muted mb-4">Reorder, add, or remove fields for this collection.</p>

                <div id="fieldManagerList" class="list-group list-group-flush mb-4 rounded border shadow-sm">
                    <!-- Fields list for reordering -->
                </div>

                <hr>
                <h6 class="mb-3 small fw-bold text-uppercase">Add New Field</h6>
                <div class="card bg-light border-0">
                    <div class="card-body p-3">
                        <div class="mb-2">
                            <label class="small fw-bold">Field Name (camelCase)</label>
                            <input type="text" class="form-control form-control-sm" id="newFieldName"
                                placeholder="e.g. authorName">
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">Label</label>
                            <input type="text" class="form-control form-control-sm" id="newFieldLabel"
                                placeholder="e.g. Author Name">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Type</label>
                            <select class="form-select form-select-sm" id="newFieldType">
                                <option value="text">Text</option>
                                <option value="textarea">Textarea</option>
                                <option value="editor">Rich Editor (EditorJS)</option>
                                <option value="markdown">Markdown Editor (EasyMDE)</option>
                                <option value="date">Date</option>
                                <option value="boolean">Boolean (Toggle)</option>
                                <option value="select">Select Dropdown</option>
                                <option value="color">Color Picker</option>
                            </select>
                        </div>
                        <button class="btn btn-info btn-sm w-100" id="addFieldBtn">Add Field</button>
                    </div>
                </div>

                <div class="mt-4">
                    <button class="btn btn-success btn-sm w-100" id="saveSchemaBtn">Save Structure Changes</button>
                </div>
            </div>
        </div>

        <!-- Event History (Optional but useful for debugging) -->
        <div class="mt-5 pt-4 border-top" id="eventLogSection" style="display: none;">
            <h6 class="text-muted small fw-bold mb-3 text-uppercase">Change History</h6>
            <div class="list-group list-group-flush shadow-sm rounded border bg-white" id="eventLog"
                style="max-height: 200px; overflow-y: auto;">
            </div>
        </div>
    </div>
</div>
</div>

<script type="module">
    import EditorJS from '@editorjs/editorjs';
    import Header from '@editorjs/header';
    import List from '@editorjs/list';
    import Quote from '@editorjs/quote';
    import Code from '@editorjs/code';
    import Marker from '@editorjs/marker';
    import ImageTool from '@editorjs/image';
    import EasyMDE from 'easymde';

    import { getCollection } from '/src/assets/js/collections.js';
    import { showToast } from '/src/assets/js/ui.js';
    import { projectState } from '/src/lib/cqrs/projection.js';
    import { uuidv4, generateStableUUID } from '/src/lib/cqrs/uuid.js';
    import { postsService } from '/src/api/index.js';
    import { IncludeParser } from '/src/assets/js/parser.js';
    import jsyaml from 'js-yaml';

    // 1. Context & Routing
    const pathParts = window.location.pathname.split('/');
    // Support two paths: /admin/editor/[id] (legacy page) and /admin/edit/[collection]/[id] (universal)
    const isUniversal = pathParts[2] === 'edit';
    const collectionType = isUniversal ? pathParts[3] : 'page';
    let entityId = isUniversal ? pathParts[4] : pathParts[3];

    // Fallback if ID is in params
    const params = new URLSearchParams(window.location.search);
    entityId = entityId || params.get('id');
    const postPath = params.get('path');
    const urlSource = params.get('source');

    const ctx = getCollection(collectionType);
    if (!ctx) {
        alert('Invalid collection: ' + collectionType);
        window.location.href = '/admin/posts';
    }

    // UI Setup
    const fieldsContainer = document.getElementById('fieldsContainer');
    const saveBtn = document.getElementById('saveBtn');
    const editorHeader = document.getElementById('editorHeader');
    const sourceSelector = document.getElementById('sourceSelector');
    const pathContainer = document.getElementById('pathContainer');
    const pathInput = document.getElementById('pathInput');

    editorHeader.textContent = `${entityId ? 'Edit' : 'New'} ${ctx.label}`;
    saveBtn.textContent = entityId ? 'Save Changes' : `Create ${ctx.label}`;

    if (collectionType === 'page') {
        document.getElementById('pageSpecificSection').style.display = 'block';
    }

    let editor; // Editor.js instance
    let currentVersion = 0;
    let currentPost = null; // For database/local fallback

    // 2. Form Rendering
    const editors = {}; // Store both EditorJS and EasyMDE instances

    function renderFields() {
        fieldsContainer.innerHTML = '';
        const initTasks = [];

        (ctx.fields || []).forEach((config) => {
            const key = config.name;
            const wrapper = document.createElement('div');
            wrapper.className = 'mb-4';

            // Special Case: Main Headings (Title or Name)
            if (key === 'title' || key === 'name') {
                const label = document.createElement('label');
                label.className = 'form-label text-muted small text-uppercase mb-1';
                label.textContent = config.label;
                fieldsContainer.appendChild(label);

                const titleInput = document.createElement('input');
                titleInput.type = 'text';
                titleInput.className = 'form-control title-input';
                titleInput.placeholder = config.label;
                titleInput.id = `field_${key}`;
                fieldsContainer.appendChild(titleInput);
                return;
            }

            const label = document.createElement('label');
            label.className = 'form-label text-muted small text-uppercase mb-1';
            label.textContent = config.label;
            wrapper.appendChild(label);

            let input;
            if (config.type === 'editor') {
                const holder = document.createElement('div');
                holder.id = `editorjs_${key}`;
                holder.className = 'bg-white p-4 rounded border shadow-sm mt-2';
                holder.style.minHeight = '300px';
                holder.textContent = 'Initializing Rich Editor...';
                wrapper.appendChild(holder);
                initTasks.push(() => initEditorJS(holder.id, key));
            } else if (config.type === 'markdown') {
                const holder = document.createElement('div');
                holder.id = `easymde_wrapper_${key}`;
                holder.className = 'mt-2';
                const textarea = document.createElement('textarea');
                textarea.id = `field_${key}`;
                holder.appendChild(textarea);
                wrapper.appendChild(holder);
                initTasks.push(() => initMarkdownEditor(textarea, key));
            } else if (config.type === 'textarea') {
                input = document.createElement('textarea');
                input.className = 'form-control';
                input.rows = 3;
            } else if (config.type === 'select') {
                input = document.createElement('select');
                input.className = 'form-select';
                (config.options || []).forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt;
                    o.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
                    input.appendChild(o);
                });
            } else if (config.type === 'boolean') {
                wrapper.className = 'mb-4 form-check form-switch';
                input = document.createElement('input');
                input.type = 'checkbox';
                input.className = 'form-check-input';
                label.className = 'form-check-label ms-2';
                wrapper.prepend(input);
            } else if (config.type === 'image') {
                const imageGroup = document.createElement('div');
                imageGroup.className = 'd-flex align-items-center gap-3 mt-2';

                const previewWrapper = document.createElement('div');
                previewWrapper.className = 'image-preview-wrapper';
                previewWrapper.id = `preview_wrapper_${key}`;
                previewWrapper.innerHTML = `
                    <div class="image-preview-placeholder" id="placeholder_${key}">
                        <i class="bi bi-camera"></i>
                    </div>
                    <img id="preview_${key}" class="d-none" src="" alt="Preview">
                `;

                const controls = document.createElement('div');
                controls.innerHTML = `
                    <button type="button" class="btn btn-outline-primary btn-sm mb-2 d-block" onclick="document.getElementById('file_${key}').click()">Change Picture</button>
                    <button type="button" class="btn btn-outline-danger btn-sm d-block" onclick="clearImage('${key}')">Remove</button>
                    <input type="file" id="file_${key}" class="d-none" accept="image/*" onchange="handleImageSelect(event, '${key}')">
                `;

                input = document.createElement('input');
                input.type = 'hidden';

                imageGroup.appendChild(previewWrapper);
                imageGroup.appendChild(controls);
                controls.appendChild(input);
                wrapper.appendChild(imageGroup);
            } else {
                input = document.createElement('input');
                input.type = config.type || 'text';
                input.className = 'form-control';
            }

            if (input) {
                input.id = `field_${key}`;
                input.name = key;
                if (config.required) input.required = true;
                if (config.default !== undefined) {
                    if (config.type === 'boolean') input.checked = config.default;
                    else input.value = config.default;
                }
                wrapper.appendChild(input);
            }
            fieldsContainer.appendChild(wrapper);
        });

        // Run init tasks AFTER everything is in the DOM
        initTasks.forEach(task => task());
    }

    async function initEditorJS(holderId, key) {
        const instance = new EditorJS({
            holder: holderId,
            placeholder: 'Type forward slash / for blocks...',
            tools: {
                header: Header, list: List, quote: Quote, code: Code, marker: Marker,
                image: { class: ImageTool, config: { endpoints: { byFile: '/upload', byUrl: '/fetch' } } }
            },
            onReady: () => {
                const holder = document.getElementById(holderId);
                if (holder) holder.textContent = ''; // Clear the "Initializing" text
            }
        });
        editors[key] = { type: 'editor', instance };
    }

    function initMarkdownEditor(element, key) {
        const instance = new EasyMDE({
            element: element,
            spellChecker: false,
            autosave: { enabled: false },
            placeholder: 'Write your content in Markdown...',
            status: ['lines', 'words', 'cursor'],
            renderingConfig: {
                singleLineBreaks: false,
                codeSyntaxHighlighting: true,
            },
        });
        editors[key] = { type: 'markdown', instance };
    }

    // 3. Data Sync Logic
    const dynamicFieldKeys = new Set();

    function getFormData() {
        const data = {};
        (ctx.fields || []).forEach(config => {
            const key = config.name;
            const input = document.getElementById(`field_${key}`);
            const ed = editors[key];

            if (ed) {
                if (ed.type === 'editor') {
                    data[key] = ed.instance.save();
                } else if (ed.type === 'markdown') {
                    data[key] = ed.instance.value();
                }
            } else if (input) {
                data[key] = config.type === 'boolean' ? input.checked : input.value;
            }
        });

        // Collect Dynamic Fields
        dynamicFieldKeys.forEach(key => {
            const input = document.getElementById(`field_dynamic_${key}`);
            if (input) data[key] = input.value;
        });

        return data;
    }

    async function setFormData(data) {
        if (!data) return;

        // Reset dynamic fields on each load
        const dynamicContainer = document.getElementById('dynamicFieldsContainer');
        if (dynamicContainer) dynamicContainer.innerHTML = '';
        dynamicFieldKeys.clear();

        const schemaKeys = new Set((ctx.fields || []).map(f => f.name));

        // 1. Set Schema Fields
        for (const config of (ctx.fields || [])) {
            const key = config.name;
            const value = data[key];
            if (value === undefined) continue;

            const ed = editors[key];
            if (ed) {
                if (ed.type === 'editor') {
                    await ed.instance.isReady;
                    let blocks = value;
                    if (typeof value === 'string') {
                        blocks = { time: Date.now(), blocks: convertTextToBlocks(value) };
                    }
                    ed.instance.render(blocks);
                } else if (ed.type === 'markdown') {
                    let text = value;
                    if (typeof value === 'object' && value.blocks) {
                        text = convertBlocksToText(value.blocks);
                    }
                    ed.instance.value(text || '');
                }
            } else if (config.type === 'image') {
                const input = document.getElementById(`field_${key}`);
                const preview = document.getElementById(`preview_${key}`);
                const placeholder = document.getElementById(`placeholder_${key}`);
                if (input && value) {
                    input.value = value;
                    preview.src = value;
                    preview.classList.remove('d-none');
                    placeholder.classList.add('d-none');
                } else if (input) {
                    clearImage(key);
                }
            } else {
                const input = document.getElementById(`field_${key}`);
                if (input) {
                    if (config.type === 'boolean') input.checked = !!value;
                    else {
                        // Handle arrays (like tags)
                        if (Array.isArray(value)) input.value = value.join(', ');
                        else if (value instanceof Date) {
                            // Format to YYYY-MM-DD for <input type="date">
                            input.value = value.toISOString().split('T')[0];
                        }
                        else input.value = value || '';
                    }
                }
            }
        }

        // 2. Detect & Set Dynamic Fields
        Object.entries(data).forEach(([key, value]) => {
            if (!schemaKeys.has(key) && key !== 'content' && key !== 'version') {
                renderDynamicField(key, value);
            }
        });
    }

    function renderDynamicField(key, value) {
        const dynamicContainer = document.getElementById('dynamicFieldsContainer');
        if (!dynamicContainer) return;

        if (dynamicFieldKeys.size === 0) {
            const head = document.createElement('h6');
            head.className = 'text-muted small fw-bold mb-3 text-uppercase border-top pt-3';
            head.textContent = 'Auto-Detected Metadata';
            dynamicContainer.appendChild(head);
        }

        dynamicFieldKeys.add(key);
        const wrapper = document.createElement('div');
        wrapper.className = 'mb-3 bg-light p-2 rounded border-start border-3 border-info';

        const label = document.createElement('label');
        label.className = 'form-label text-muted small text-uppercase mb-1 d-flex justify-content-between';
        label.innerHTML = `<span>${key} <small class="text-info">(Detected from file)</small></span>`;
        wrapper.appendChild(label);

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'form-control form-control-sm';
        input.id = `field_dynamic_${key}`;

        if (Array.isArray(value)) input.value = value.join(', ');
        else if (value instanceof Date) input.value = value.toISOString().split('T')[0];
        else input.value = value || '';

        wrapper.appendChild(input);
        dynamicContainer.appendChild(wrapper);
    }

    function convertBlocksToText(blocks) {
        return (blocks || []).map(b => {
            if (b.type === 'paragraph') return b.data.text;
            if (b.type === 'header') return '#'.repeat(b.data.level) + ' ' + b.data.text;
            if (b.type === 'list') {
                return b.data.items.map(i => '- ' + i).join('\n');
            }
            return '';
        }).join('\n\n');
    }

    // Legacy Markdown Fallback
    function convertTextToBlocks(text) {
        if (!text) return [];
        const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        return normalized.split(/\n{2,}/).map(p => p.trim()).filter(p => p.length > 0).map(p => {
            return { type: 'paragraph', data: { text: p.replace(/\n+/g, ' ').replace(/\s+/g, ' ') } };
        });
    }

    function parseMarkdownWithFrontmatter(raw) {
        const fmRegex = /^-{3,}\r?\n([\s\S]+?)\r?\n-{3,}\r?\n([\s\S]*)/;
        const match = raw.match(fmRegex);
        if (match) {
            try {
                const metadata = jsyaml.load(match[1]);
                return { ...metadata, content: match[2].trim() };
            } catch (e) {
                console.warn('Frontmatter parse error', e);
                return { content: raw.trim() };
            }
        }
        return { content: raw.trim() };
    }

    function generateMarkdownWithFrontmatter(payload) {
        const { content, ...metadata } = payload;

        // Clean up metadata
        if (metadata.tags && typeof metadata.tags === 'string') {
            metadata.tags = metadata.tags.split(',').map(t => t.trim()).filter(t => t.length > 0);
        }
        if (metadata.date && metadata.date instanceof Date) {
            metadata.date = metadata.date.toISOString().split('T')[0];
        }

        let yaml;
        try {
            yaml = jsyaml.dump(metadata, { lineWidth: -1 }).trim();
        } catch (e) {
            console.error('YAML dump error', e);
            yaml = `title: ${metadata.title || ''}`;
        }
        return `---\n${yaml}\n---\n\n${content}`;
    }

    // 4. Image Helpers
    window.handleImageSelect = (event, key) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const dataUrl = e.target.result;
            document.getElementById(`field_${key}`).value = dataUrl;
            const preview = document.getElementById(`preview_${key}`);
            preview.src = dataUrl;
            preview.classList.remove('d-none');
            document.getElementById(`placeholder_${key}`).classList.add('d-none');
        };
        reader.readAsDataURL(file);
    };

    window.clearImage = (key) => {
        document.getElementById(`field_${key}`).value = '';
        const preview = document.getElementById(`preview_${key}`);
        preview.src = '';
        preview.classList.add('d-none');
        document.getElementById(`placeholder_${key}`).classList.remove('d-none');
        const fileInput = document.getElementById(`file_${key}`);
        if (fileInput) fileInput.value = '';
    };

    async function loadEntity() {
        if (!entityId) return;

        // Context Retrieval: Try params first, then sessionStorage
        let effectiveSource = urlSource;
        let effectivePath = postPath;
        const cachedCtx = sessionStorage.getItem('post_ctx_' + entityId);
        if (cachedCtx) {
            const { source, path } = JSON.parse(cachedCtx);
            effectiveSource = effectiveSource || source;
            effectivePath = effectivePath || path;
        }

        // Logic Change: Prioritize the INTENDED source (database or local) 
        // before falling back to the Event Store.
        const mode = effectiveSource || 'database';
        sourceSelector.value = mode;

        if (collectionType === 'page') {
            if (mode === 'database') {
                try {
                    currentPost = await postsService.getById(entityId);
                    if (currentPost) {
                        setFormData(currentPost);
                        return; // Found in DB, stop here unless we want to merge events
                    }
                } catch (e) {
                    console.warn(`[Editor] Database load failed for ${entityId}:`, e.message);
                }
            } else if (mode === 'local') {
                const allLocal = IncludeParser.getLocalPosts();
                const found = allLocal.find(p => p.path === effectivePath || p.id === entityId);
                if (found) {
                    pathInput.value = found.path;
                    pathContainer.style.display = 'block';
                    const parsed = parseMarkdownWithFrontmatter(found.content);
                    setFormData({ ...parsed, title: parsed.title || found.title });
                    return;
                }
            }
        }

        // Fallback: Check CQRS Event Store if not found in primary source 
        // or if explicitly requested in the future.
        const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
        const eventsId = uuidRegex.test(entityId) ? entityId : generateStableUUID(entityId);

        const res = await fetch(`/__api/events?type=${collectionType}&id=${eventsId}&t=${Date.now()}`);
        if (res.ok) {
            const { events } = await res.json();
            if (events && events.length > 0) {
                const state = projectState(events, ctx.reducer);
                setFormData(state);
                currentVersion = state.version;
                if (collectionType === 'page') sourceSelector.value = 'event-store';
                return;
            }
        }
    }

    // 4. Save Handler
    saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true;
        const rawData = getFormData();

        // Resolve async fields (like editor)
        const payload = {};
        for (const [k, v] of Object.entries(rawData)) {
            payload[k] = await v;
        }

        // Tag Normalization: Ensure tags is an array if it's a string
        if (payload.tags && typeof payload.tags === 'string') {
            payload.tags = payload.tags.split(',').map(t => t.trim()).filter(t => t.length > 0);
        }

        const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
        let aggregateId = entityId;

        if (!aggregateId) {
            aggregateId = uuidv4();
        } else if (!uuidRegex.test(aggregateId)) {
            aggregateId = generateStableUUID(aggregateId);
        }

        const eventType = entityId ? ctx.events.update : ctx.events.create;

        const eventData = {
            aggregateId,
            aggregateType: collectionType,
            eventType,
            version: currentVersion + 1,
            payload
        };

        try {
            // CQRS Write
            await fetch('/__api/events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(eventData)
            });

            // Legacy Page Sync
            if (collectionType === 'page') {
                const mode = sourceSelector.value;
                if (mode === 'database') {
                    // Normalize payload for SQL database if needed
                    const dbPayload = { ...payload };
                    if (typeof dbPayload.content === 'object') {
                        dbPayload.content = JSON.stringify(dbPayload.content);
                    }

                    if (entityId) {
                        await postsService.update(entityId, dbPayload);
                    } else {
                        await postsService.create(dbPayload);
                    }
                } else if (mode === 'local' && pathInput.value) {
                    const fullMd = generateMarkdownWithFrontmatter(payload);
                    await fetch('/__api/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            path: pathInput.value,
                            content: fullMd
                        })
                    });

                    // Sync the SPA's internal index
                    if (IncludeParser && IncludeParser.updatePost) {
                        IncludeParser.updatePost(pathInput.value, fullMd);
                    }
                }
            }

            showToast(`${ctx.label} Saved!`);
            if (!entityId) setTimeout(() => window.location.href = `/admin/edit/${collectionType}/${aggregateId}`, 1000);
            else {
                entityId = aggregateId;
                await loadEntity();
                saveBtn.disabled = false;
            }
        } catch (e) {
            showToast(e.message, 'error');
            saveBtn.disabled = false;
        }
    });

    // 5. Init
    renderFields();
    loadEntity();

    // UI Reactivity for Source
    sourceSelector?.addEventListener('change', () => {
        pathContainer.style.display = sourceSelector.value === 'local' ? 'block' : 'none';
    });

    // 6. Field Management Implementation
    const fieldManagerList = document.getElementById('fieldManagerList');
    const newFieldName = document.getElementById('newFieldName');
    const newFieldLabel = document.getElementById('newFieldLabel');
    const newFieldType = document.getElementById('newFieldType');
    const addFieldBtn = document.getElementById('addFieldBtn');
    const saveSchemaBtn = document.getElementById('saveSchemaBtn');

    function renderFieldManager() {
        fieldManagerList.innerHTML = ctx.fields.map((f, i) => `
            <div class="list-group-item d-flex justify-content-between align-items-center py-2" 
                 draggable="true" ondragstart="handleDragStart(${i})" ondragover="handleDragOver(event, ${i})" 
                 ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd()">
                <div class="d-flex align-items-center">
                    <div class="drag-handle me-2">
                        <i class="bi bi-grip-vertical" style="font-size: 1.2rem;"></i>
                    </div>
                    <div>
                        <span class="fw-bold small">${f.label}</span>
                        <div class="text-muted" style="font-size: 0.7rem;">${f.name} (${f.type})</div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-sm btn-link p-0 text-danger ms-2" onclick="removeField(${i})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    let draggedItemIndex = null;

    window.handleDragStart = (index) => {
        draggedItemIndex = index;
        const item = fieldManagerList.children[index];
        setTimeout(() => item.classList.add('dragging'), 0);
    };

    window.handleDragOver = (e, index) => {
        e.preventDefault();
        const item = fieldManagerList.children[index];
        if (index !== draggedItemIndex) {
            item.classList.add('drag-over');
        }
    };

    window.handleDragLeave = (e) => {
        e.target.closest('.list-group-item')?.classList.remove('drag-over');
    };

    window.handleDragEnd = () => {
        Array.from(fieldManagerList.children).forEach(child => {
            child.classList.remove('dragging', 'drag-over');
        });
    };

    window.handleDrop = (e, dropIndex) => {
        e.preventDefault();
        handleDragEnd();
        if (draggedItemIndex === null || draggedItemIndex === dropIndex) return;

        const movedItem = ctx.fields.splice(draggedItemIndex, 1)[0];
        ctx.fields.splice(dropIndex, 0, movedItem);

        draggedItemIndex = null;
        renderFieldManager();
        renderFields();
    };

    window.removeField = (index) => {
        if (ctx.fields[index].name === 'title') return alert('Cannot remove Title field');
        if (confirm(`Remove field "${ctx.fields[index].label}"?`)) {
            ctx.fields.splice(index, 1);
            renderFieldManager();
            renderFields();
        }
    };

    addFieldBtn.onclick = () => {
        const name = newFieldName.value.trim();
        const label = newFieldLabel.value.trim();
        const type = newFieldType.value;

        if (!name || !label) return alert('Name and Label are required');
        if (ctx.fields.find(f => f.name === name)) return alert('Field name already exists');

        ctx.fields.push({ name, label, type });
        newFieldName.value = '';
        newFieldLabel.value = '';
        renderFieldManager();
        renderFields();
    };

    saveSchemaBtn.onclick = async () => {
        saveSchemaBtn.disabled = true;
        saveSchemaBtn.textContent = 'Saving Schema...';

        try {
            // We need to fetch the whole collections.js, update the specific collection, and save it back
            // Since we can't easily parse JS here for a "partial" update without risk,
            // we will fetch the COLLECTIONS object and overwrite it.

            // Actually, for simplicity in this demo environment, 
            // we'll use a specialized API or just save the whole COLLECTIONS structure.
            // In a real app, this would be a server-side DB change.

            // For now, let's prepare the updated collections object
            const { COLLECTIONS: updatedRegistry } = await import('/src/assets/js/collections.js?t=' + Date.now());
            updatedRegistry[collectionType].fields = ctx.fields;

            const fileContent = `import { pageReducer, userReducer } from '/src/lib/cqrs/projection.js';

export const COLLECTIONS = ${JSON.stringify(updatedRegistry, null, 4).replace(/"reducer": "(.*?)"/g, 'reducer: $1')};

export function getCollection(type) {
    return COLLECTIONS[type] || null;
}
`;
            // NOTE: The above replacement logic for 'reducer' is a bit hacky because JSON.stringify loses the function reference.
            // A better way is to rebuild the file content manually but that's complex.
            // Let's try a safer approach that matches how we wrote it.

            const res = await fetch('/__api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    path: 'src/assets/js/collections.js',
                    content: generateCollectionsFile(updatedRegistry)
                })
            });

            if (!res.ok) throw new Error('Failed to save collections.js');
            showToast('Schema updated successfully!');
        } catch (e) {
            showToast('Schema Error: ' + e.message, 'error');
        } finally {
            saveSchemaBtn.disabled = false;
            saveSchemaBtn.textContent = 'Save Structure Changes';
        }
    };

    function generateCollectionsFile(registry) {
        // This is a helper to stringify while preserving the reducer function references
        let content = `import { pageReducer, userReducer } from '/src/lib/cqrs/projection.js';\n\n`;
        content += `export const COLLECTIONS = {\n`;

        Object.entries(registry).forEach(([key, col]) => {
            content += `    ${key}: {\n`;
            content += `        label: '${col.label}',\n`;

            // Handle reducer function - it's either pageReducer, userReducer, or an inline function
            let reducerStr = 'null';
            if (key === 'page') reducerStr = 'pageReducer';
            else if (key === 'user') reducerStr = 'userReducer';
            else reducerStr = col.reducer.toString();

            content += `        reducer: ${reducerStr},\n`;
            content += `        events: ${JSON.stringify(col.events, null, 8).trim()},\n`;
            content += `        fields: ${JSON.stringify(col.fields, null, 8).trim()}\n`;
            content += `    },\n`;
        });

        content += `};\n\n`;
        content += `export function getCollection(type) { return COLLECTIONS[type] || null; }\n`;
        return content;
    }

    renderFieldManager();
</script>
