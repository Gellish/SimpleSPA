<title>Manage Posts</title>

<!-- Header -->
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <h1 class="h3">Posts</h1>
            <a href="/admin/editor" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> New Post
            </a>
        </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm" style="min-height: 400px;">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" style="width: 10%">Source</th>
                            <th scope="col" style="width: 35%">Title</th>
                            <th scope="col" style="width: 35%">Content</th>
                            <th scope="col" style="width: 20%">Actions</th>
                        </tr>
                    </thead>
                    <!-- The parser will inject rows here iteratively -->
                    <tbody>
                        <tr class="align-middle" data-foreach="admin_posts as post">
                            <td>{{source_badge}}</td>
                            <td>
                                <div class="fw-bold text-dark">{{title}}</div>
                                <div class="mb-1">{{tags_html}}</div>
                                <small class="text-muted d-block text-truncate"
                                    style="max-width: 200px;">{{path}}</small>
                            </td>
                            <td class="text-muted">
                                <small class="d-block text-truncate" style="max-width: 300px;">{{preview}}</small>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a href="{{edit_url}}" class="btn btn-sm btn-outline-secondary">Edit</a>

                                    <form data-action="delete-post"
                                        data-confirm="Are you sure you want to delete this post?">
                                        <input type="hidden" name="id" value="{{id}}">
                                        <input type="hidden" name="source" value="{{source}}">
                                        <input type="hidden" name="path" value="{{encoded_path}}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>

                    </tbody>
                </table>

                <!-- Empty State Fallback (Visible if no rows rendered, though parser handles this better usually) -->
                <div id="empty-state" class="d-none text-center py-5">
                    <p class="text-muted">No posts found.</p>
                </div>
            </div>
        </div>
    </div>
</div>
