<title>Dashboard</title>

<div class="p-4">
    <div
        class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
        <h1 class="h2 fw-bold text-dark">Dashboard</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="window.location.reload()">
                <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
            <a href="/admin/editor" class="btn btn-sm btn-primary">
                <i class="bi bi-plus-lg"></i> New Post
            </a>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="row g-4 mb-5">
        <div class="col-12 col-sm-6 col-xl-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-primary bg-opacity-10 p-3 rounded-3 me-3">
                        <i class="bi bi-file-earmark-text fs-3 text-primary"></i>
                    </div>
                    <div>
                        <h6 class="card-title text-muted mb-1">Total Posts</h6>
                        <h2 class="mb-0 fw-bold" data-count="admin_posts">0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-xl-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-success bg-opacity-10 p-3 rounded-3 me-3">
                        <i class="bi bi-people fs-3 text-success"></i>
                    </div>
                    <div>
                        <h6 class="card-title text-muted mb-1">Total Users</h6>
                        <h2 class="mb-0 fw-bold" data-count="admin_users">0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-xl-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-info bg-opacity-10 p-3 rounded-3 me-3">
                        <i class="bi bi-hdd-network fs-3 text-info"></i>
                    </div>
                    <div>
                        <h6 class="card-title text-muted mb-1">System Mode</h6>
                        <h2 class="mb-0 fw-bold">Offline</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tables Section -->
    <div class="row g-4">
        <!-- Recent Posts Table -->
        <div class="col-12 col-xl-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-dark">Recent Posts</h5>
                    <a href="/admin/posts" class="btn btn-sm btn-link text-decoration-none">View All</a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted small text-uppercase">
                                <tr>
                                    <th class="ps-4">Title</th>
                                    <th>Source</th>
                                    <th class="text-end pe-4">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr data-foreach="admin_posts as post">
                                    <td class="ps-4">
                                        <div class="fw-bold text-dark">{{title}}</div>
                                        <small class="text-muted d-block text-truncate"
                                            style="max-width: 250px;">{{preview}}</small>
                                    </td>
                                    <td>{{source_badge}}</td>
                                    <td class="text-end pe-4">
                                        <a href="{{edit_url}}" class="btn btn-sm btn-light border shadow-sm">
                                            <i class="bi bi-pencil-square text-primary"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Users Sidebar -->
        <div class="col-12 col-xl-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-dark">Active Users</h5>
                    <a href="/admin/users" class="btn btn-sm btn-link text-decoration-none">Manage</a>
                </div>
                <div class="card-body p-3">
                    <div class="list-group list-group-flush">
                        <div class="list-group-item px-0 border-0 mb-2" data-foreach="admin_users as user">
                            <div class="d-flex align-items-center">
                                <div class="flex-shrink-0 bg-light p-2 rounded-circle me-3">
                                    <i class="bi bi-person text-secondary"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <div class="fw-bold text-dark">{{name}}</div>
                                    <small class="text-muted d-block">{{email}}</small>
                                </div>
                                <span class="badge {{roleBadge}} rounded-pill p-1 px-2"
                                    style="font-size: 0.7em;">{{roleDisplay}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
