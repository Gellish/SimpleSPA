<title>Login</title>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h1 class="h3 mb-4 fw-normal text-center">Please sign in</h1>

                    <form id="loginForm" action="/login" method="POST" data-action="login" data-redirect="/admin"
                        data-error-target="#errorAlert">
                        <div class="alert alert-danger d-none" id="errorAlert"></div>
                        <div class="form-floating mb-3">
                            <input type="email" name="email" class="form-control" id="emailInput"
                                placeholder="name@example.com" required>
                            <label for="emailInput">Email address</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" name="password" class="form-control" id="passwordInput"
                                placeholder="Password" required>
                            <label for="passwordInput">Password</label>
                        </div>

                        <div class="checkbox mb-3">
                            <label>
                                <input type="checkbox" value="remember-me"> Remember me
                            </label>
                        </div>
                        <button class="w-100 btn btn-lg btn-primary" type="submit" id="submitBtn">Sign in</button>

                        <hr class="my-4">
                        <div class="text-center">
                            <p class="mb-0">Don't have an account? <a href="/signup">Sign Up</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
